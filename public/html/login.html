<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ControlaPR — Entrar</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-card__brand">
        <div class="brand-icon"><i class="fa-solid fa-code-branch"></i></div>
        <h1>Controla<span>PR</span></h1>
        <p>Controle de andamento de Pull Requests</p>
      </div>

      <div class="auth-card__tabs">
        <button class="auth-tab active" data-tab="tabLogin">
          <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>
        <button class="auth-tab" data-tab="tabRegister">
          <i class="fa-solid fa-user-plus"></i> Cadastrar-se
        </button>
      </div>

      <div class="auth-card__body">

        <!-- ── Login ── -->
        <div id="tabLogin" class="tab-panel active">
          <form id="formLogin" novalidate>
            <div class="form-group">
              <label for="loginEmail">E-mail</label>
              <input id="loginEmail" type="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
              <label for="loginPassword">Senha</label>
              <div class="input-pw">
                <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                <button type="button" class="input-pw__toggle" tabindex="-1" aria-label="Mostrar senha">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
            <p id="loginError" class="form-error" style="display:none"></p>
            <button type="submit" class="btn btn--primary btn--full btn--lg" style="margin-top:4px">
              <i class="fa-solid fa-right-to-bracket"></i> Entrar
            </button>
          </form>
        </div>

        <!-- ── Cadastro ── -->
        <div id="tabRegister" class="tab-panel">
          <form id="formRegister" novalidate>
            <div class="form-group">
              <label for="registerName">Nome completo</label>
              <input id="registerName" type="text" class="form-control" placeholder="João Silva" required autocomplete="name">
            </div>
            <div class="form-group">
              <label for="registerEmail">E-mail</label>
              <input id="registerEmail" type="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
              <label for="registerPassword">Senha</label>
              <div class="input-pw">
                <input id="registerPassword" type="password" class="form-control" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
                <button type="button" class="input-pw__toggle" tabindex="-1" aria-label="Mostrar senha">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="registerConfirm">Confirmar senha</label>
              <div class="input-pw">
                <input id="registerConfirm" type="password" class="form-control" placeholder="Repita a senha" required autocomplete="new-password">
                <button type="button" class="input-pw__toggle" tabindex="-1" aria-label="Mostrar senha">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
            <p id="registerError" class="form-error" style="display:none"></p>
            <button type="submit" class="btn btn--primary btn--full btn--lg" style="margin-top:4px">
              <i class="fa-solid fa-user-plus"></i> Criar conta
            </button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
